<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FreshMe v0.4 Cover Pool</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f1ea;
      color: #25221d;
    }
    main {
      width: min(1180px, calc(100% - 32px));
      margin: 32px auto 48px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 720;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 24px;
      color: #6d655b;
      font-size: 15px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 18px;
    }
    figure {
      margin: 0;
      background: #fffaf2;
      border: 1px solid rgba(76, 63, 45, 0.16);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(43, 34, 20, 0.08);
    }
    img {
      display: block;
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
    }
    figcaption {
      padding: 10px 12px 12px;
      font-size: 14px;
      line-height: 1.35;
    }
    small {
      display: block;
      margin-top: 2px;
      color: #857b70;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main>
    <h1>FreshMe v0.4 Cover Pool</h1>
    <p>Same recurring person, stronger variation across outfit, scene, instrument, and action.</p>
    <section class="grid">
      <figure><img src="../assets/covers-v04-final/freshme-cover-01-xiao-mountain.png" alt="山风箫晨"><figcaption>01 山风箫晨<small>xiao / mountain</small></figcaption></figure>
      <figure><img src="../assets/covers-v04-final/freshme-cover-02-pipa-red-gold.png" alt="红金琵琶"><figcaption>02 红金琵琶<small>pipa / courtyard</small></figcaption></figure>
      <figure><img src="../assets/covers-v04-final/freshme-cover-03-bamboo-taichi.png" alt="竹林开身"><figcaption>03 竹林开身<small>tai chi / bamboo</small></figcaption></figure>
      <figure><img src="../assets/covers-v04-final/freshme-cover-04-lotus-singing-bowl.png" alt="莲池钵音"><figcaption>04 莲池钵音<small>singing bowl / lotus</small></figcaption></figure>
      <figure><img src="../assets/covers-v04-final/freshme-cover-05-terracotta-tea.png" alt="陶院晨茶"><figcaption>05 陶院晨茶<small>tea / terracotta</small></figcaption></figure>
      <figure><img src="../assets/covers-v04-final/freshme-cover-06-rain-umbrella-fan.png" alt="雨亭轻步"><figcaption>06 雨亭轻步<small>umbrella / rain</small></figcaption></figure>
      <figure><img src="../assets/covers-v04-final/freshme-cover-07-coastal-kite.png" alt="海风纸鸢"><figcaption>07 海风纸鸢<small>kite / coast</small></figcaption></figure>
      <figure><img src="../assets/covers-v04-final/freshme-cover-08-ink-study.png" alt="书房新墨"><figcaption>08 书房新墨<small>ink / study</small></figcaption></figure>
      <figure><img src="../assets/covers-v04-final/freshme-cover-09-mountain-erhu.png" alt="云台二胡"><figcaption>09 云台二胡<small>erhu / clouds</small></figcaption></figure>
      <figure><img src="../assets/covers-v04-final/freshme-cover-10-rooftop-qigong.png" alt="天台清气"><figcaption>10 天台清气<small>qigong / rooftop</small></figcaption></figure>
      <figure><img src="../assets/covers-v04-final/freshme-cover-11-ribbon-dance.png" alt="晨光绸舞"><figcaption>11 晨光绸舞<small>ribbon / dance</small></figcaption></figure>
      <figure><img src="../assets/covers-v04-final/freshme-cover-12-riverside-ruan.png" alt="桥上阮音"><figcaption>12 桥上阮音<small>ruan / bridge</small></figcaption></figure>
      <figure><img src="../assets/covers-v04-final/freshme-cover-13-herb-harvest.png" alt="露草新采"><figcaption>13 露草新采<small>herbs / field</small></figcaption></figure>
    </section>
  </main>
</body>
</html>
