<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f7efe2">
    <title>FreshMe</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="hero" aria-label="FreshMe 今日晨练">
        <div class="cover-wrap">
          <img id="daily-cover" class="cover" alt="FreshMe 今日封面">
          <div class="cover-fallback" aria-hidden="true"></div>
        </div>

        <div class="content">
          <p class="date" id="today-label"></p>
          <div class="brand-lockup" aria-label="FreshMe 新省吾身">
            <h1>FreshMe</h1>
            <p class="brand-cn">新省吾身</p>
          </div>
          <p class="subtitle" id="daily-mantra"></p>

          <div class="stats" aria-label="今日晨练统计">
            <div>
              <span id="total-time">--</span>
              <small>总时长</small>
            </div>
            <div>
              <span id="track-count">--</span>
              <small>曲目</small>
            </div>
          </div>

          <button id="start-button" class="start-button" type="button">Start</button>
        </div>
      </section>

      <section class="player-zone" aria-label="YouTube 播放器">
        <div id="player"></div>
      </section>

      <section class="playlist" aria-label="今日播放清单">
        <div class="section-title">
          <h2>Today's Flow</h2>
          <span id="flow-status">Ready</span>
        </div>
        <ol id="playlist-list"></ol>
      </section>
    </main>

    <script src="./data/tracks-data.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="./app.js"></script>
  </body>
</html>
